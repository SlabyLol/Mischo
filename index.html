<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mischo Remote Desktop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: Arial; background:#f0f2f5; text-align:center; padding:2em; }
h1 { color:#222; font-size:2.5em; margin-bottom:0.5em; }
p { font-size:1.2em; margin-bottom:1.5em; }
input, button { padding:10px; font-size:1em; margin:5px; }
#screen { border:1px solid #000; width:800px; height:450px; margin-top:20px; cursor:pointer; }
a.button { display:inline-block; padding:10px 20px; margin:5px; background:#007bff; color:#fff; text-decoration:none; border-radius:6px; }
a.button:hover { background:#0056b3; }
footer { margin-top:2em; font-size:0.9em; color:#555; }
</style>
</head>
<body>
<h1>Mischo Remote Desktop</h1>
<p>Download installers, control your remote machine, or visit the website for instructions.</p>

<!-- Installer Downloads -->
<a class="button" href="https://github.com/SlabyLol/MischoINST/raw/main/windows/installmischo.bat" download>Windows Installer</a>
<a class="button" href="https://github.com/SlabyLol/MischoINST/raw/main/linuxdebian/installer.sh" download>Linux Installer</a>

<!-- Link to MischoINST website -->
<a class="button" href="https://slabylol.github.io/MischoINST/" target="_blank">Go to MischoINST Website</a>

<h2>Browser Remote Control</h2>
<p>Enter the IP of the device running Mischo Agent:</p>
<input type="text" id="ip" placeholder="YOUR-IP">
<button onclick="connect()">Connect</button>
<br><br>
<img id="screen" src="" alt="Remote Screen">

<script>
let ws;
let img = document.getElementById("screen");

function connect() {
    const ip = document.getElementById("ip").value.trim();
    if(!ip) { alert("Enter a valid IP"); return; }

    const url = `ws://${ip}:8080`;
    try {
        ws = new WebSocket(url);
    } catch (err) {
        alert("Failed to create WebSocket: " + err);
        return;
    }

    ws.onopen = () => {
        console.log("Connected to Mischo Agent at " + url);
        updateScreen();
    };

    ws.onclose = () => {
        console.log("WebSocket closed. Try reconnecting.");
    };

    ws.onerror = (err) => {
        console.error("WebSocket error:", err);
        alert("Failed to connect. Make sure Mischo Agent is running and IP is correct.");
    };

    ws.onmessage = (msg) => {
        try {
            const data = JSON.parse(msg.data);
            if(data.type === "screenshot") {
                img.src = "data:image/jpeg;base64," + data.data;
            }
        } catch (e) {
            console.error("Failed to parse message:", e);
        }
    };
}

function updateScreen() {
    if(ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({action:"screenshot"}));
        setTimeout(updateScreen, 1000); // Update every second
    }
}

// Klick-Steuerung
img.addEventListener("click", e => {
    if(ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({action:"click"}));
    }
});
</script>

<footer>&copy; DarkFox Co. 2026</footer>
</body>
</html>
